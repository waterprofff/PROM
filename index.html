<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Прайс обновляется</title>
  <style>
    :root {
      --bg: #071311;
      --card: rgba(255, 255, 255, 0.08);
      --text: #f6fffb;
      --muted: #b9d8cf;
      --accent: #32d6a0;
      --accent-2: #ffcf5a;
      --line: rgba(255, 255, 255, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      overflow: hidden;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 15%, rgba(50, 214, 160, 0.24), transparent 34%),
        radial-gradient(circle at 82% 80%, rgba(255, 207, 90, 0.2), transparent 30%),
        linear-gradient(135deg, #071311 0%, #10241f 55%, #091a24 100%);
    }

    .wrap {
      width: min(860px, 100%);
      position: relative;
      z-index: 1;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 9px 13px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.06);
      font-size: 14px;
      font-weight: 700;
    }

    .pulse {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 0 rgba(50, 214, 160, 0.7);
      animation: pulse 1.8s infinite;
    }

    .panel {
      position: relative;
      overflow: hidden;
      margin-top: 22px;
      padding: clamp(28px, 6vw, 64px);
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--card);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(18px);
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, transparent 0%, rgba(255, 255, 255, 0.18) 45%, transparent 58%);
      transform: translateX(-120%);
      animation: scan 4.8s ease-in-out infinite;
      pointer-events: none;
    }

    .panel::after {
      content: "";
      position: absolute;
      right: clamp(18px, 4vw, 46px);
      top: clamp(18px, 4vw, 42px);
      width: clamp(86px, 16vw, 148px);
      aspect-ratio: 1;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 18px;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.16) 1px, transparent 1px),
        linear-gradient(rgba(255, 255, 255, 0.16) 1px, transparent 1px),
        rgba(255, 255, 255, 0.05);
      background-size: 33.33% 33.33%;
      opacity: 0.7;
      transform: rotate(8deg);
      animation: tableFloat 5.5s ease-in-out infinite;
      pointer-events: none;
    }

    h1 {
      margin: 0;
      max-width: 760px;
      font-size: clamp(42px, 8vw, 82px);
      line-height: 0.94;
      letter-spacing: 0;
    }

    .lead {
      max-width: 620px;
      margin: 22px 0 0;
      color: var(--muted);
      font-size: clamp(17px, 2.4vw, 22px);
      line-height: 1.6;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 34px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      padding: 0 24px;
      border-radius: 12px;
      color: #071311;
      background: var(--accent);
      font-weight: 900;
      text-decoration: none;
      box-shadow: 0 14px 30px rgba(50, 214, 160, 0.26);
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      background: #59e6b9;
    }

    .note {
      align-self: center;
      color: rgba(246, 255, 251, 0.62);
      font-size: 14px;
    }

    .grid {
      position: fixed;
      inset: 0;
      opacity: 0.18;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.12) 1px, transparent 1px);
      background-size: 46px 46px;
      transform: perspective(700px) rotateX(58deg) translateY(20%);
      transform-origin: bottom;
      pointer-events: none;
    }

    .cell {
      position: fixed;
      width: 96px;
      height: 34px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
      pointer-events: none;
      animation: drift 9s ease-in-out infinite;
    }

    .cell::before {
      content: "";
      display: block;
      width: 42%;
      height: 5px;
      margin: 14px 0 0 12px;
      border-radius: 999px;
      background: rgba(50, 214, 160, 0.7);
    }

    .cell.one {
      left: 7vw;
      top: 18vh;
    }

    .cell.two {
      right: 8vw;
      top: 24vh;
      animation-delay: -2.5s;
    }

    .cell.three {
      left: 13vw;
      bottom: 16vh;
      animation-delay: -5s;
    }

    @keyframes pulse {
      70% {
        box-shadow: 0 0 0 12px rgba(50, 214, 160, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(50, 214, 160, 0);
      }
    }

    @keyframes scan {
      0%, 42% {
        transform: translateX(-120%);
      }

      64%, 100% {
        transform: translateX(120%);
      }
    }

    @keyframes tableFloat {
      50% {
        transform: translateY(10px) rotate(3deg);
      }
    }

    @keyframes drift {
      50% {
        transform: translateY(-18px) translateX(10px);
      }
    }

    @media (max-width: 560px) {
      body {
        padding: 16px;
      }

      .panel {
        border-radius: 16px;
      }

      .btn {
        width: 100%;
      }

      .cell,
      .panel::after {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="grid"></div>
  <div class="cell one"></div>
  <div class="cell two"></div>
  <div class="cell three"></div>

  <main class="wrap">
    <div class="badge">
      <span class="pulse"></span>
      Прайс-лист переехал
    </div>

    <section class="panel">
      <h1>Здесь больше нет старого прайса</h1>
      <p class="lead">
        Я обновил формат и перенес актуальный прайс в Google Sheets.
        Там удобнее смотреть позиции, фильтровать данные и работать с таблицей.
      </p>

      <div class="actions">
        <a class="btn" href="https://docs.google.com/spreadsheets/d/1mu_H5DUkRX7lD_VVCAZeaS1rrk12zSjpVr0_DIhRZww/edit?gid=0#gid=0">
          Открыть новый прайс
        </a>
        <span class="note">Ссылка откроется в этом же окне</span>
      </div>
    </section>
  </main>
</body>
</html>
